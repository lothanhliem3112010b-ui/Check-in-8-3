<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EMC 8/3 - CHECKIN</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #fff0f3;
            font-family: 'Arial', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* Chữ EMC lớn trên đầu */
        .emc-header {
            font-size: 3rem; font-weight: 900;
            color: #ff0a54; margin: 20px 0 10px;
            text-shadow: 2px 2px 10px rgba(255, 10, 84, 0.2);
            letter-spacing: 5px;
        }

        .title-83 {
            color: #ff4d6d; font-size: 1.2rem; font-weight: bold; margin-bottom: 20px;
        }

        /* Khung Camera */
        .camera-box {
            position: relative;
            width: 350px; height: 350px;
            border: 12px solid #ff85a2; /* Khung hồng */
            border-radius: 20px;
            overflow: hidden;
            background: #fce4ec;
            box-shadow: 0 10px 30px rgba(255, 133, 162, 0.5);
        }

        video {
            width: 100%; height: 100%; object-fit: cover;
        }
        .mirror { transform: scaleX(-1); }

        /* Lớp phủ chữ trên ảnh */
        .overlay {
            position: absolute; width: 100%;
            text-align: center; color: white;
            font-weight: bold; pointer-events: none;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        .ot-top { top: 15px; font-size: 1.2rem; }
        .ot-bottom { bottom: 15px; font-size: 1.8rem; }

        /* Nút điều khiển */
        .controls {
            margin-top: 30px; display: flex; gap: 15px;
        }

        button {
            padding: 12px 25px; border: none; border-radius: 50px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-capture { background: #ff4d6d; color: white; }
        .btn-switch { background: white; color: #ff4d6d; border: 2px solid #ff4d6d; }

        button:active { transform: scale(0.95); }

        /* Hiệu ứng trang trí hoa hồng bay */
        .deco-flower {
            position: absolute; font-size: 20px; opacity: 0.6;
            animation: float 5s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(20deg); }
        }
    </style>
</head>
<body>

    <div class="emc-header">EMC</div>
    <div class="title-83">CHÀO MỪNG NGÀY QUỐC TẾ PHỤ NỮ</div>

    <div class="camera-box">
        <video id="video" autoplay playsinline class="mirror"></video>
        <div class="overlay ot-top">CHÚC MỪNG NGÀY 8/3</div>
        <div class="overlay ot-bottom">EMC 8/3</div>
    </div>

    <div class="controls">
        <button class="btn-switch" onclick="switchCam()">🔄 Xoay Cam</button>
        <button class="btn-capture" onclick="takePhoto()">📸 Chụp & Lưu</button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        let currentFacingMode = 'user';

        // Khởi động Camera
        async function initCamera() {
            try {
                if (window.stream) {
                    window.stream.getTracks().forEach(track => track.stop());
                }
                const constraints = {
                    video: { facingMode: currentFacingMode },
                    audio: false
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                window.stream = stream;
                video.srcObject = stream;
                
                if(currentFacingMode === 'user') video.classList.add('mirror');
                else video.classList.remove('mirror');
            } catch (e) {
                alert("Lỗi: Không tìm thấy Camera hoặc chưa cấp quyền!");
            }
        }

        function switchCam() {
            currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            initCamera();
        }

        function takePhoto() {
            const ctx = canvas.getContext('2d');
            canvas.width = 600;
            canvas.height = 600;

            // Vẽ video
            ctx.save();
            if (currentFacingMode === 'user') {
                ctx.translate(600, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(video, 0, 0, 600, 600);
            ctx.restore();

            // Vẽ khung hồng
            ctx.lineWidth = 25;
            ctx.strokeStyle = "#ff85a2";
            ctx.strokeRect(0, 0, 600, 600);

            // Vẽ chữ
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.shadowBlur = 10; ctx.shadowColor = "black";
            
            ctx.font = "bold 35px Arial";
            ctx.fillText("CHÚC MỪNG NGÀY 8/3", 300, 60);
            
            ctx.font = "bold 55px Arial";
            ctx.fillText("EMC 8/3", 300, 550);

            // Tải về
            const link = document.createElement('a');
            link.download = 'EMC_83_Checkin.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Tạo hiệu ứng hoa bay trang trí nền
        function addDeco() {
            for(let i=0; i<10; i++){
                let f = document.createElement('div');
                f.className = 'deco-flower';
                f.innerHTML = '🌸';
                f.style.left = Math.random()*100 + 'vw';
                f.style.top = Math.random()*100 + 'vh';
                f.style.animationDelay = Math.random()*5 + 's';
                document.body.appendChild(f);
            }
        }

        addDeco();
        initCamera();
    </script>
</body>
</html>
